apiVersion: v1alpha1
kind: Setting
metadata:
  name: plugin-comment-next-settings
spec:
  forms:
    - group: basic
      label: 基本设置
      formSchema:
        - $formkit: number
          label: 评论分页条数
          name: size
          validation: required
          value: 20
        - $formkit: number
          label: 回复分页条数
          name: replySize
          validation: required
          value: 10
        - $formkit: checkbox
          label: 同时加载评论的回复
          name: withReplies
          id: withReplies
          key: withReplies
          value: false
        - $formkit: number
          label: 同时加载回复的条数
          if: "$get(withReplies).value === true"
          name: withReplySize
          id: withReplySize
          key: withReplySize
          validation: required
          value: 5
        - $formkit: checkbox
          label: 显示评论者设备信息
          name: showCommenterDevice
          value: true
        - $formkit: checkbox
          label: 支持私密评论
          id: enablePrivateComment
          key: enablePrivateComment
          name: enablePrivateComment
          help: 开启之后，评论者可选是否私密评论，私密评论仅评论者（已登录）和网站管理员（包含评论查看权限）可见，
          value: false
        - $formkit: checkbox
          if: "$get(enablePrivateComment).value === true"
          label: 显示私密评论状态
          name: showPrivateCommentBadge
          id: showPrivateCommentBadge
          key: showPrivateCommentBadge
          value: true
          help: 开启后，私密评论会显示一个私密状态标识
    - group: security
      label: 安全设置
      formSchema:
        - $formkit: group
          name: captcha
          label: 验证码
          value:
            enable: false
            type: ALPHANUMERIC
          children:
            - $formkit: checkbox
              label: 匿名评论需要验证码
              name: anonymousCommentCaptcha
              id: anonymousCommentCaptcha
              key: anonymousCommentCaptcha
              value: false
            - $formkit: select
              label: 验证码类型
              if: "$get(anonymousCommentCaptcha).value === true"
              name: type
              id: type
              value: "ALPHANUMERIC"
              options:
                - label: 字母数字组合
                  value: "ALPHANUMERIC"
                - label: 算术验证码
                  value: "ARITHMETIC"
            - $formkit: number
              if: "$get(type).value === ALPHANUMERIC"
              name: captchaLength
              key: captchaLength
              label: 验证码长度
              help: 字母数字组合验证码长度，不宜过长或过短，建议4-6位
              max: 8
              value: 4
              validation: required
            - $formkit: radio
              if: "$get(type).value === ALPHANUMERIC"
              name: ignoreCase
              key: ignoreCase
              label: 是否忽略验证码大小写验证
              help: 忽略大小写验证码，建议开启
              value: true
              options:
                - label: 是
                  value: true
                - label: 否
                  value: false
            - $formkit: number
              if: "$get(type).value === ARITHMETIC"
              name: arithmeticRange
              key: arithmeticRange
              label: 计算范围
              help: 算术验证码计算范围
              value: 90
              validation: required
    - group: upload
      label: 图片上传
      formSchema:
        - $formkit: checkbox
          label: 启用评论图片上传
          name: enabled
          id: uploadEnabled
          key: uploadEnabled
          value: false
          help: 开启后，评论编辑器会显示图片上传按钮。图片会先上传到插件后端，再按下方配置存入 Halo 附件库或 ImgBB。
        - $formkit: checkbox
          if: "$get(uploadEnabled).value === true"
          label: 允许未登录用户上传图片
          name: allowAnonymousUpload
          id: allowAnonymousUpload
          key: allowAnonymousUpload
          value: false
          help: 建议只在配合大小限制和频率限制时开启，避免被盗刷。
        - $formkit: select
          if: "$get(uploadEnabled).value === true && $get(allowAnonymousUpload).value === true"
          label: 未登录用户上传方式
          name: anonymousProvider
          id: anonymousProvider
          key: anonymousProvider
          value: "DISABLED"
          options:
            - label: 禁用
              value: "DISABLED"
            - label: Halo 附件库
              value: "HALO_ATTACHMENT"
            - label: ImgBB
              value: "IMGBB"
        - $formkit: select
          if: "$get(uploadEnabled).value === true"
          label: 登录用户上传方式
          name: authenticatedProvider
          id: authenticatedProvider
          key: authenticatedProvider
          value: "HALO_ATTACHMENT"
          options:
            - label: 禁用
              value: "DISABLED"
            - label: Halo 附件库
              value: "HALO_ATTACHMENT"
            - label: ImgBB
              value: "IMGBB"
        - $formkit: number
          if: "$get(uploadEnabled).value === true && $get(allowAnonymousUpload).value === true"
          label: 未登录用户单张图片大小上限（KB）
          name: anonymousMaxSizeKb
          value: 2048
          min: 1
          validation: required|min:1
        - $formkit: number
          if: "$get(uploadEnabled).value === true"
          label: 登录用户单张图片大小上限（KB）
          name: authenticatedMaxSizeKb
          value: 5120
          min: 1
          validation: required|min:1
        - $formkit: group
          if: "$get(uploadEnabled).value === true && ($get(authenticatedProvider).value === 'HALO_ATTACHMENT' || ($get(allowAnonymousUpload).value === true && $get(anonymousProvider).value === 'HALO_ATTACHMENT'))"
          name: haloAttachment
          label: Halo 附件库
          value:
            policyName: ""
            groupName: ""
          children:
            - $formkit: attachmentPolicySelect
              name: policyName
              label: 存储策略
              auto-select: false
              validation: required
              help: 可选择 Halo 的本地存储策略或其他附件存储策略。
            - $formkit: attachmentGroupSelect
              name: groupName
              label: 存储组
              auto-select: false
              clearable: true
        - $formkit: group
          if: "$get(uploadEnabled).value === true && ($get(authenticatedProvider).value === 'IMGBB' || ($get(allowAnonymousUpload).value === true && $get(anonymousProvider).value === 'IMGBB'))"
          name: imgBb
          label: ImgBB
          value:
            apiKey: ""
            expirationSeconds: 0
          children:
            - $formkit: password
              name: apiKey
              label: API Key
              validation: required
              help: 只保存在插件配置中，由后端请求 ImgBB，不会暴露给前端。
            - $formkit: number
              name: expirationSeconds
              label: 图片过期时间（秒）
              value: 0
              min: 0
              help: 0 表示不设置过期时间。
        - $formkit: group
          if: "$get(uploadEnabled).value === true"
          name: security
          label: 上传安全拦截
          value:
            anonymousRateLimit: 5
            anonymousRateWindowSeconds: 60
            authenticatedRateLimit: 30
            authenticatedRateWindowSeconds: 60
          children:
            - $formkit: number
              label: 未登录用户窗口内允许上传次数
              name: anonymousRateLimit
              value: 5
              min: 1
              validation: required|min:1
            - $formkit: number
              label: 未登录用户限流窗口（秒）
              name: anonymousRateWindowSeconds
              value: 60
              min: 1
              validation: required|min:1
            - $formkit: number
              label: 登录用户窗口内允许上传次数
              name: authenticatedRateLimit
              value: 30
              min: 1
              validation: required|min:1
            - $formkit: number
              label: 登录用户限流窗口（秒）
              name: authenticatedRateWindowSeconds
              value: 60
              min: 1
              validation: required|min:1
    - group: ai
      label: AI 写作
      formSchema:
        - $formkit: checkbox
          label: 启用 AI 写作助手
          name: enabled
          id: aiEnabled
          key: aiEnabled
          value: false
          help: 需要安装并启用 Halo AI Foundation 后前台才会显示 AI 入口；未安装时普通评论功能不受影响。模型和供应商密钥在 AI Foundation 中配置，本插件只调用已启用的语言模型。
        - $formkit: aiModelSelector
          if: "$get(aiEnabled).value === true"
          name: languageModelName
          label: 语言模型
          placeholder: 留空使用默认语言模型
          help: 选择 AI Foundation 中已启用的语言模型；留空时使用 AI Foundation 配置的默认语言模型。
        - $formkit: checkbox
          if: "$get(aiEnabled).value === true"
          label: 允许未登录用户使用 AI
          name: allowAnonymous
          id: aiAllowAnonymous
          key: aiAllowAnonymous
          value: false
          help: AI 会消耗模型额度，建议只在配合限流时开启。
        - $formkit: number
          if: "$get(aiEnabled).value === true"
          label: 最大输入字符数
          name: maxInputLength
          value: 2000
          min: 1
          validation: required|min:1
        - $formkit: number
          if: "$get(aiEnabled).value === true"
          label: 最大输出 Tokens
          name: maxOutputTokens
          value: 512
          min: 1
          validation: required|min:1
        - $formkit: number
          if: "$get(aiEnabled).value === true"
          label: 温度
          name: temperature
          value: 0.7
          min: 0
          max: 2
          step: 0.1
          validation: required|min:0|max:2
        - $formkit: textarea
          if: "$get(aiEnabled).value === true"
          label: 系统提示词
          name: systemPrompt
          rows: 4
          value: "你是一个评论写作助手。你只输出可直接放进评论框的中文内容，不要解释过程，不要使用 Markdown 标题，不要编造事实。"
        - $formkit: group
          if: "$get(aiEnabled).value === true"
          name: security
          label: AI 安全拦截
          value:
            anonymousRateLimit: 3
            anonymousRateWindowSeconds: 60
            authenticatedRateLimit: 20
            authenticatedRateWindowSeconds: 60
          children:
            - $formkit: number
              label: 未登录用户窗口内允许生成次数
              name: anonymousRateLimit
              value: 3
              min: 1
              validation: required|min:1
            - $formkit: number
              label: 未登录用户限流窗口（秒）
              name: anonymousRateWindowSeconds
              value: 60
              min: 1
              validation: required|min:1
            - $formkit: number
              label: 登录用户窗口内允许生成次数
              name: authenticatedRateLimit
              value: 20
              min: 1
              validation: required|min:1
            - $formkit: number
              label: 登录用户限流窗口（秒）
              name: authenticatedRateWindowSeconds
              value: 60
              min: 1
              validation: required|min:1
    - group: avatar
      label: 头像设置
      formSchema:
        - $formkit: checkbox
          label: 是否启用第三方头像
          name: enable
          id: enable
          key: enable
          value: false
        - $formkit: select
          label: 头像服务提供者
          if: "$get(enable).value === true"
          name: provider
          options:
            - label: "Gravatar"
              value: "gravatar"
          value: "gravatar"
        - $formkit: text
          label: 头像服务镜像地址
          if: "$get(enable).value === true"
          name: providerMirror
          value: ""
          help: 使用官方源则留空, 示例：https://gravatar.com
        - $formkit: select
          label: 头像策略
          if: "$get(enable).value === true"
          name: policy
          options:
            - label: "仅匿名用户"
              value: "anonymousUser"
            - label: "所有用户"
              value: "allUser"
            - label: "匿名&无头像用户"
              value: "noAvatarUser"
          value: "anonymousUser"
    - group: badge
      label: 徽章设置
      formSchema:
        - $formkit: checkbox
          label: 启用首评徽章
          name: enableFirstCommentBadge
          id: enableFirstCommentBadge
          key: enableFirstCommentBadge
          value: true
          help: 开启后，评论列表中的第一条评论会自动展示首评徽章。
        - $formkit: group
          label: 首评徽章
          name: firstCommentBadge
          value:
            label: 首评
            icon: mdi:medal-outline
            color: "#f59e0b"
            title: 本文第一位评论者
          children:
            - $formkit: text
              label: 显示文案
              name: label
              value: 首评
            - $formkit: iconify
              label: Iconify 图标
              name: icon
              format: name
              valueOnly: true
              value: mdi:medal-outline
              help: 选择 Iconify 图标，留空则只显示文字。
            - $formkit: color
              label: 徽章颜色
              name: color
              value: "#f59e0b"
            - $formkit: text
              label: 提示文案
              name: title
              value: 本文第一位评论者
        - $formkit: group
          label: 管理员徽章
          name: adminBadge
          value:
            label: 站长
            icon: mdi:shield-star-outline
            color: "#3b82f6"
            title: 站点管理员
          children:
            - $formkit: text
              label: 显示文案
              name: label
              value: 站长
            - $formkit: iconify
              label: Iconify 图标
              name: icon
              format: name
              valueOnly: true
              value: mdi:shield-star-outline
            - $formkit: color
              label: 徽章颜色
              name: color
              value: "#3b82f6"
            - $formkit: text
              label: 提示文案
              name: title
              value: 站点管理员
        - $formkit: array
          label: 额外管理员用户
          name: adminIdentifiers
          value: []
          addLabel: 添加管理员用户
          help: 系统超级管理员会自动获得管理员徽章，这里只需要补充额外用户。
          itemLabels:
            - type: text
              label: $value.username
          children:
            - $formkit: userSelect
              label: Halo 用户
              name: username
              validation: required
    - group: editor
      label: 编辑器
      formSchema:
        - $formkit: text
          name: placeholder
          label: 自定义评论框占位符
