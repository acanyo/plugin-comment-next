apiVersion: v1alpha1
kind: Setting
metadata:
  name: plugin-comment-next-settings
spec:
  forms:
    - group: basic
      label: 基本设置
      formSchema:
        - $formkit: number
          label: 评论分页条数
          name: size
          validation: required
          value: 20
        - $formkit: number
          label: 回复分页条数
          name: replySize
          validation: required
          value: 10
        - $formkit: checkbox
          label: 同时加载评论的回复
          name: withReplies
          id: withReplies
          key: withReplies
          value: false
        - $formkit: number
          label: 同时加载回复的条数
          if: "$get(withReplies).value === true"
          name: withReplySize
          id: withReplySize
          key: withReplySize
          validation: required
          value: 5
        - $formkit: checkbox
          label: 显示评论者设备信息
          name: showCommenterDevice
          value: false
        - $formkit: checkbox
          label: 支持私密评论
          id: enablePrivateComment
          key: enablePrivateComment
          name: enablePrivateComment
          help: 开启之后，评论者可选是否私密评论，私密评论仅评论者（已登录）和网站管理员（包含评论查看权限）可见，
          value: false
        - $formkit: checkbox
          if: "$get(enablePrivateComment).value === true"
          label: 显示私密评论状态
          name: showPrivateCommentBadge
          id: showPrivateCommentBadge
          key: showPrivateCommentBadge
          value: true
          help: 开启后，私密评论会显示一个私密状态标识
    - group: security
      label: 安全设置
      formSchema:
        - $formkit: group
          name: captcha
          label: 验证码
          value:
            enable: false
            type: ALPHANUMERIC
          children:
            - $formkit: checkbox
              label: 匿名评论需要验证码
              name: anonymousCommentCaptcha
              id: anonymousCommentCaptcha
              key: anonymousCommentCaptcha
              value: false
            - $formkit: select
              label: 验证码类型
              if: "$get(anonymousCommentCaptcha).value === true"
              name: type
              id: type
              value: "ALPHANUMERIC"
              options:
                - label: 字母数字组合
                  value: "ALPHANUMERIC"
                - label: 算术验证码
                  value: "ARITHMETIC"
            - $formkit: number
              if: "$get(type).value === ALPHANUMERIC"
              name: captchaLength
              key: captchaLength
              label: 验证码长度
              help: 字母数字组合验证码长度，不宜过长或过短，建议4-6位
              max: 8
              value: 4
              validation: required
            - $formkit: radio
              if: "$get(type).value === ALPHANUMERIC"
              name: ignoreCase
              key: ignoreCase
              label: 是否忽略验证码大小写验证
              help: 忽略大小写验证码，建议开启
              value: true
              options:
                - label: 是
                  value: true
                - label: 否
                  value: false
            - $formkit: number
              if: "$get(type).value === ARITHMETIC"
              name: arithmeticRange
              key: arithmeticRange
              label: 计算范围
              help: 算术验证码计算范围
              value: 90
              validation: required
    - group: avatar
      label: 头像设置
      formSchema:
        - $formkit: checkbox
          label: 是否启用第三方头像
          name: enable
          id: enable
          key: enable
          value: false
        - $formkit: select
          label: 头像服务提供者
          if: "$get(enable).value === true"
          name: provider
          options:
            - label: "Gravatar"
              value: "gravatar"
          value: "gravatar"
        - $formkit: text
          label: 头像服务镜像地址
          if: "$get(enable).value === true"
          name: providerMirror
          value: ""
          help: 使用官方源则留空, 示例：https://gravatar.com
        - $formkit: select
          label: 头像策略
          if: "$get(enable).value === true"
          name: policy
          options:
            - label: "仅匿名用户"
              value: "anonymousUser"
            - label: "所有用户"
              value: "allUser"
            - label: "匿名&无头像用户"
              value: "noAvatarUser"
          value: "anonymousUser"
    - group: badge
      label: 徽章设置
      formSchema:
        - $formkit: checkbox
          label: 启用首评徽章
          name: enableFirstCommentBadge
          id: enableFirstCommentBadge
          key: enableFirstCommentBadge
          value: true
          help: 开启后，评论列表中的第一条评论会自动展示首评徽章。
        - $formkit: group
          label: 首评徽章
          name: firstCommentBadge
          value:
            label: 首评
            icon: medal
            title: 本文第一位评论者
          children:
            - $formkit: text
              label: 显示文案
              name: label
              value: 首评
            - $formkit: text
              label: 图标名称
              name: icon
              value: medal
              help: 使用评论组件内置图标名称，留空则只显示文字。
            - $formkit: text
              label: 提示文案
              name: title
              value: 本文第一位评论者
        - $formkit: group
          label: 管理员徽章
          name: adminBadge
          value:
            label: 站长
            icon: shield
            title: 站点管理员
          children:
            - $formkit: text
              label: 显示文案
              name: label
              value: 站长
            - $formkit: text
              label: 图标名称
              name: icon
              value: shield
            - $formkit: text
              label: 提示文案
              name: title
              value: 站点管理员
        - $formkit: array
          label: 管理员身份匹配
          name: adminIdentifiers
          value: []
          addLabel: 添加管理员身份
          itemLabels:
            - type: text
              label: $value.username
            - type: text
              label: $value.email
            - type: text
              label: $value.displayName
          children:
            - $formkit: text
              label: 用户名
              name: username
              help: 已登录用户可按 Halo 用户名匹配。
            - $formkit: email
              label: 邮箱
              name: email
              help: 匿名评论者可按邮箱匹配。
            - $formkit: text
              label: 昵称
              name: displayName
              help: 不建议只依赖昵称，昵称可被普通评论者填写。
        - $formkit: array
          label: 活跃等级徽章
          name: levelRules
          value: []
          addLabel: 添加等级徽章
          itemLabels:
            - type: text
              label: $value.label
            - type: text
              label: "≥"
            - type: text
              label: $value.minComments
            - type: text
              label: "条"
          children:
            - $formkit: text
              label: 规则 ID
              name: id
              value: ""
              placeholder: level-regular
              validation: required
            - $formkit: text
              label: 显示文案
              name: label
              value: ""
              placeholder: 常驻
              validation: required
            - $formkit: number
              label: 最少活跃评论数
              name: minComments
              value: 10
              min: 1
              validation: required
            - $formkit: text
              label: 图标名称
              name: icon
              value: sparkle
            - $formkit: text
              label: 提示文案
              name: title
              value: ""
              placeholder: 累计评论达到 10 条
        - $formkit: array
          label: 专属用户徽章
          name: customRules
          value: []
          addLabel: 添加专属徽章
          itemLabels:
            - type: text
              label: $value.label
            - type: text
              label: $value.match.username
            - type: text
              label: $value.match.email
          children:
            - $formkit: text
              label: 规则 ID
              name: id
              value: ""
              placeholder: special-builder
              validation: required
            - $formkit: text
              label: 显示文案
              name: label
              value: ""
              placeholder: 共建者
              validation: required
            - $formkit: text
              label: 图标名称
              name: icon
              value: star
            - $formkit: text
              label: 提示文案
              name: title
              value: ""
            - $formkit: group
              label: 匹配条件
              name: match
              children:
                - $formkit: text
                  label: 用户名
                  name: username
                - $formkit: email
                  label: 邮箱
                  name: email
                - $formkit: text
                  label: 昵称
                  name: displayName
    - group: editor
      label: 编辑器
      formSchema:
        - $formkit: text
          name: placeholder
          label: 自定义评论框占位符
